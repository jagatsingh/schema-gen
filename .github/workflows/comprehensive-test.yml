name: Comprehensive Format Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  quick-validation:
    runs-on: ubuntu-latest
    name: Quick Format Validation

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --frozen --all-extras --dev

    - name: Run quick format validation
      run: |
        uv run --frozen pytest tests/test_generator_output_stability.py tests/test_generator_correctness_invariants.py tests/test_format_validation.py -v
        uv run --frozen python scripts/validate_all_formats.py --verbose

    - name: Run unit tests with coverage
      run: |
        uv run --frozen pytest tests/ -v --cov=src/schema_gen --cov-report=xml --cov-report=term --ignore=tests/test_e2e_compile.py

  compiler-validation:
    runs-on: ubuntu-latest
    name: External Compiler Validation
    needs: quick-validation

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install

    - name: Install Python dependencies
      run: uv sync --frozen --all-extras --dev

    - name: Install Node.js and TypeScript
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'

    - name: Install TypeScript and Zod
      run: npm install -g typescript zod @types/node

    - name: Set up Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Download Jackson JARs
      run: |
        mkdir -p /tmp/java-libs
        cd /tmp/java-libs
        wget -q https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-core/2.19.0/jackson-core-2.19.0.jar
        wget -q https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-databind/2.19.0/jackson-databind-2.19.0.jar
        wget -q https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-annotations/2.19.0/jackson-annotations-2.19.0.jar
        echo "CLASSPATH=/tmp/java-libs/*" >> $GITHUB_ENV

    - name: Install Kotlin
      run: |
        wget -q -O kotlin-compiler.zip "https://github.com/JetBrains/kotlin/releases/download/v2.2.20/kotlin-compiler-2.2.20.zip"
        unzip -q kotlin-compiler.zip -d /opt
        rm kotlin-compiler.zip
        echo "/opt/kotlinc/bin" >> $GITHUB_PATH

    - name: Install Protocol Buffers
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Verify compilers
      run: |
        echo "TypeScript:" && tsc --version
        echo "Java:" && javac --version
        echo "Kotlin:" && kotlinc -version 2>&1 || true
        echo "Protobuf:" && protoc --version
        echo "Node.js:" && node --version

    # Failure-swallow (`|| echo "completed with warnings"`) was removed
    # 2026-04-26 — historically every external-compiler step would print a
    # warning and exit 0 even when the compiler rejected the generated
    # output. That allowed real bugs (#102 protoc/sqlalchemy/jackson)
    # to ship undetected. These steps must now genuinely fail the workflow
    # when the compiler errors.

    - name: Validate Zod/TypeScript compilation
      run: uv run --frozen python scripts/validate_all_formats.py --format zod --verbose

    - name: Validate Jackson/Java compilation
      run: uv run --frozen python scripts/validate_all_formats.py --format jackson --verbose

    - name: Validate Kotlin compilation
      run: uv run --frozen python scripts/validate_all_formats.py --format kotlin --verbose

    - name: Validate Protocol Buffers compilation
      run: uv run --frozen python scripts/validate_all_formats.py --format protobuf --verbose

    # Run the full framework-execution suite — these tests are skipped
    # locally when a toolchain is missing, but every toolchain is
    # installed above so nothing should skip on CI.
    - name: Run framework-execution tests
      env:
        # Make ``zod`` resolvable for the tsc test.
        NODE_PATH: ${{ env.NODE_PATH }}:/usr/lib/node_modules
      run: uv run --frozen pytest tests/test_generator_framework_execution.py -v

  cross-platform-validation:
    runs-on: ${{ matrix.os }}
    name: Cross-Platform Validation
    needs: quick-validation

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --frozen --all-extras --dev

    - name: Test core functionality on ${{ matrix.os }}
      run: |
        uv run --frozen schema-gen --version
        uv run --frozen pytest tests/test_generator_output_stability.py tests/test_generator_correctness_invariants.py tests/test_generator_framework_execution.py tests/test_format_validation.py -v

  validation-summary:
    runs-on: ubuntu-latest
    name: Validation Summary
    needs: [quick-validation, compiler-validation, cross-platform-validation]
    if: always()

    steps:
    - name: Check validation results
      run: |
        echo "Validation Summary"
        echo "=================="
        echo "Quick Validation: ${{ needs.quick-validation.result }}"
        echo "Compiler Validation: ${{ needs.compiler-validation.result }}"
        echo "Cross-Platform: ${{ needs.cross-platform-validation.result }}"

        if [[ "${{ needs.quick-validation.result }}" == "failure" ]]; then
          echo "Critical validation failure"
          exit 1
        fi

        echo "Validation completed"
