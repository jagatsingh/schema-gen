name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0) - leave empty to use current'
        required: false
        type: string
      target:
        description: 'Publishing target'
        required: true
        default: 'test-pypi'
        type: choice
        options:
          - 'test-pypi'
          - 'pypi'
          - 'both'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --frozen --all-extras --dev

    - name: Get version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" pyproject.toml
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" =~ ^refs/tags/v(.*)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        else
          VERSION=$(grep -Po '(?<=version = ")[^"]*' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi
        echo "Building version: $VERSION"

    - name: Run tests
      run: |
        uv run --frozen pytest tests/ -v --ignore=tests/test_e2e_compile.py --cov=src/schema_gen --cov-fail-under=60

    - name: Run linting
      run: |
        uv run --frozen ruff check src/ tests/
        uv run --frozen ruff format --check src/ tests/

    - name: Build package
      run: |
        uv build --verbose
        ls -la dist/

    - name: Verify package
      run: |
        pip install dist/*.whl
        python -c "import schema_gen; print(f'Package v{schema_gen.__version__} OK')"
        schema-gen --help

    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: dist-${{ steps.version.outputs.version }}
        path: dist/
        retention-days: 30

  publish-test-pypi:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'test-pypi' || inputs.target == 'both')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'alpha'))
    environment:
      name: test-pypi
      url: https://test.pypi.org/project/schema-gen/
    permissions:
      id-token: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: dist-${{ needs.build-and-test.outputs.version }}
        path: dist/

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
        skip-existing: true

  publish-pypi:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'pypi' || inputs.target == 'both')) ||
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc'))
    environment:
      name: pypi
      url: https://pypi.org/project/schema-gen/
    permissions:
      id-token: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: dist-${{ needs.build-and-test.outputs.version }}
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      with:
        verbose: true
        skip-existing: true

  create-github-release:
    needs: [build-and-test, publish-pypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PRERELEASE_FLAG=""
        if [[ "${{ github.ref_name }}" == *"alpha"* ]] || [[ "${{ github.ref_name }}" == *"beta"* ]] || [[ "${{ github.ref_name }}" == *"rc"* ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi

        gh release create "${{ github.ref_name }}" \
          --title "Schema Gen v${{ needs.build-and-test.outputs.version }}" \
          --generate-notes \
          $PRERELEASE_FLAG
