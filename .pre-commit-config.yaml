repos:
  - repo: local
    hooks:
      # NOTE: schema-gen-validate / schema-gen-generate hooks are intentionally
      # NOT enabled in the schema-gen repo itself. schema-gen is the *tool*; it
      # has no `schemas/` directory of its own to validate or regenerate.
      # Downstream consumers should pull these hooks via:
      #     repo: https://github.com/jagatsingh/schema-gen
      # which references the definitions in `.pre-commit-hooks.yaml`.

      # Run version compatibility tests
      - id: schema-gen-compatibility
        name: Version compatibility check
        entry: uv run python scripts/check_compatibility.py --current-only
        language: system
        pass_filenames: false
        files: 'src/schema_gen/generators/.*\.py$'
        stages: [pre-push]

      # Fast generator-output safety net — runs on every commit when a
      # generator file or its tests change. Catches:
      #   - output-format drift vs golden snapshots
      #   - syntactic correctness of generated code (AST-level)
      #   - framework-execution: import + use the generated file in its
      #     real framework (Pydantic, SQLAlchemy, dataclasses, TypedDict,
      #     Pathway, JSON Schema, GraphQL, Avro). External-toolchain tests
      #     (protoc, cargo, tsc, kotlinc, javac) skip cleanly when the
      #     compiler is missing, but they ALWAYS run on CI where the
      #     compilers are installed.
      - id: schema-gen-generator-tests
        name: Generator correctness + framework-execution tests
        entry: uv run pytest tests/test_generator_output_stability.py tests/test_generator_correctness_invariants.py tests/test_generator_framework_execution.py -q --no-header
        language: system
        pass_filenames: false
        files: '^(src/schema_gen/generators/|tests/(test_generator_|golden_outputs/))'

  # File and content validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # Golden-output snapshots must match raw generator output verbatim.
        exclude: '^tests/golden_outputs/'
      - id: end-of-file-fixer
        exclude: '^tests/golden_outputs/'
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-xml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: debug-statements
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '^tests/golden_outputs/'

  # Python security and quality checks (temporarily disabled)
  # - repo: https://github.com/PyCQA/bandit
  #   rev: 1.8.6
  #   hooks:
  #     - id: bandit
  #       args: ['-r', 'src/', '-ll']
  #       exclude: '^tests/'

  # - repo: https://github.com/adamchainz/blacken-docs
  #   rev: 1.19.1
  #   hooks:
  #     - id: blacken-docs
  #       additional_dependencies: [black>=24.0.0]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py312-plus]
        # Don't rewrite raw generator-output fixtures.
        exclude: '^tests/golden_outputs/'

  # Linting and formatting (Ruff replaces Black, isort, and multiple linters)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        exclude: '^tests/golden_outputs/'
      - id: ruff-format
        exclude: '^tests/golden_outputs/'

  # Secrets scanning (matches tradingutils)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/AlexanderDokuchaev/md-dead-link-check
    rev: "v1.2.0"
    hooks:
      - id: md-dead-link-check
        args: ["--warn"]
        files: \.md$

  # Type checking with mypy (temporarily disabled for faster iteration)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.17.1
  #   hooks:
  #     - id: mypy
  #       additional_dependencies:
  #         - pydantic>=2.11.0
  #         - types-PyYAML
  #         - types-requests
  #         - sqlalchemy>=2.0.0
  #       args: [--ignore-missing-imports, --install-types, --non-interactive]

  # Documentation quality (temporarily disabled)
  # - repo: https://github.com/pycqa/pydocstyle
  #   rev: 6.3.0
  #   hooks:
  #     - id: pydocstyle
  #       args: [--convention=google, --add-ignore=D100,D101,D102,D103,D104,D105]

  # Vulnerability scanning (matches tradingutils)
  - repo: local
    hooks:
      - id: uv-secure
        name: uv-secure vulnerability check
        entry: bash -c 'uv-secure uv.lock; rc=$?; if [ "$rc" -eq 1 ]; then exit 1; else exit 0; fi'
        language: system
        files: '(pyproject\.toml|uv\.lock)$'
        pass_filenames: false

  # Test validation (run on push only to avoid slow commits)
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: uv run pytest tests/ --maxfail=1 -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
